<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="theme.css"><link rel="stylesheet" href="popup.css"></head>
<body>
  <div id="card">
    <div id="top">
      <span id="progress">0 / 0</span>
      <button id="close" title="Hide">✕</button>
    </div>
    <div id="q">Loading…</div>
    <div id="answers"></div>
    <div id="feedback"></div>
    <div class="row">
      <button id="hint" class="btn ghost">💡 Hint</button>
      <button id="endless" class="btn pill" title="Keep generating questions past the daily set">∞ Endless</button>
      <button id="next" class="btn primary" style="display:none">Next →</button>
    </div>
  </div>
  <script src="popup.js"></script>
</body></html>
